<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Optimized Font Loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" 
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    >
    
    <!-- Initial title - will be updated by script below -->
    <title>Loading...</title>
    
    <!-- Inline script to set title from localStorage immediately -->
    <script>
      (function() {
        try {
          const stored = localStorage.getItem('portfolio.site-config');
          if (stored) {
            const config = JSON.parse(stored);
            if (config && config.dashboard && config.dashboard.browser && config.dashboard.browser.browserTabTitle) {
              document.title = config.dashboard.browser.browserTabTitle;
            }
          }
        } catch (e) {
          // Silently fail, React will handle it
        }
      })();
    </script>
    
    <!-- Basic loading styles -->
    <style>
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-top-color: #b6f45b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading-screen">
      <div class="loading-spinner"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
