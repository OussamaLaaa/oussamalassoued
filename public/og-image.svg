<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Oussama Lassoued OG Image</title>
  <desc id="desc">Open Graph preview image for Oussama Lassoued, UX/UI Designer in Tunisia and AI Product Builder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b0f"/>
      <stop offset="55%" stop-color="#121218"/>
      <stop offset="100%" stop-color="#0a101a"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#b6f45b" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#b6f45b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#b6f45b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d9ff7a"/>
      <stop offset="100%" stop-color="#8adf49"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <circle cx="970" cy="110" r="190" fill="#b6f45b" fill-opacity="0.06"/>
  <circle cx="1030" cy="150" r="110" fill="#b6f45b" fill-opacity="0.12"/>
  <circle cx="150" cy="540" r="230" fill="#7aa9ff" fill-opacity="0.07"/>

  <g filter="url(#shadow)">
    <rect x="84" y="76" width="1032" height="478" rx="36" fill="#101117" fill-opacity="0.92" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <g transform="translate(128 140)">
    <rect x="0" y="0" width="112" height="112" rx="28" fill="#ffffff" fill-opacity="0.06" stroke="#b6f45b" stroke-opacity="0.4"/>
    <image href="/logo-white.png" x="18" y="18" width="76" height="76" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <text x="128" y="332" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="-1.8">
    Oussama Lassoued
  </text>
  <text x="128" y="392" fill="url(#accent)" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600" letter-spacing="0.2">
    UX/UI Designer in Tunisia | AI Product Builder | Design Engineer
  </text>
  <text x="128" y="446" fill="#d7dbe6" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="400">
    Google UX Design Professional certified
  </text>
  <text x="128" y="484" fill="#d7dbe6" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="400">
    مصمم UX/UI في تونس | خبير تجربة المستخدم والواجهات
  </text>

  <g transform="translate(128 512)">
    <rect x="0" y="0" width="262" height="44" rx="22" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="18" y="29" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500">User experience, UI, AI products, design systems</text>
  </g>

  <text x="1072" y="548" text-anchor="end" fill="#ffffff" fill-opacity="0.55" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500">
    oussamalassoued.me
  </text>
</svg>
